<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indonesia Explorer</title>
    <meta name="theme-color" content="#0f1f3a">
    <link rel="icon" type="image/svg+xml" href="./assets/favicons/favicon.svg">
    <link rel="shortcut icon" href="./assets/favicons/favicon.svg">
    <link rel="apple-touch-icon" href="./assets/favicons/favicon.svg">
    <link rel="preload" as="image" href="./assets/images/jakarta-stadium.avif" type="image/avif" fetchpriority="high">
    <link rel="preload" as="image" href="./assets/images/jakarta-stadium.webp" type="image/webp">
    <link rel='stylesheet' href='style.css'>
</head>
<body>
    <div class="container">
        <div class="language-selector">
            <button class="lang-btn active" onclick="changeLanguage('bg')" id="bgBtn">BG</button>
            <button class="lang-btn" onclick="changeLanguage('en')" id="enBtn">EN</button>
        </div>

        <header>
            <h1 id="headerTitle">🇮🇩 Indonesia Explorer</h1>
            <p id="headerSubtitle">Explore detailed information about Indonesia</p>
            <button id="wildlifeInfoBtn" class="wildlife-info-btn" type="button" style="display: none;"></button>
        </header>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 20px;">Loading Indonesia data...</p>
            </div>
        </div>
    </div>

    <!-- City Modal -->
    <div class="modal-overlay" id="cityModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="image-container">
                <img id="modalImage" class="modal-image" src="" alt="City" loading="lazy" decoding="async" sizes="(max-width: 768px) 90vw, 600px">
            </div>
            <div class="modal-body">
                <div id="modalRank" class="modal-rank"></div>
                <h2 id="modalTitle" class="modal-title"></h2>
                <p id="modalDescription" class="modal-description"></p>
                
                <div class="modal-info">
                    <div class="modal-info-item">
                        <div class="modal-info-label" id="populationLabel">Population</div>
                        <div id="modalPopulation" class="modal-info-value"></div>
                    </div>
                    <div class="modal-info-item">
                        <div class="modal-info-label" id="coordinatesLabel">Coordinates</div>
                        <div id="modalCoordinates" class="modal-info-value"></div>
                    </div>
                </div>

                <div class="modal-highlights">
                    <div class="highlights-title" id="attractionsLabel">Key Attractions</div>
                    <div id="modalHighlights" class="highlights-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Stadium Modal -->
    <div class="modal-overlay" id="stadiumModal">
        <div class="modal-content stadium-modal-content">
            <button class="modal-close" onclick="closeStadiumModal()">&times;</button>
            <div class="image-container">
                <img id="stadiumModalImage" class="modal-image stadium-modal-image" src="" alt="Gelora Bung Karno football pitch view" loading="lazy" decoding="async" sizes="(max-width: 768px) 95vw, 640px" style="background: linear-gradient(45deg, #f0f0f0 25%, #e0e0e0 25%, #e0e0e0 50%, #f0f0f0 50%, #f0f0f0 75%, #e0e0e0 75%, #e0e0e0);">
            </div>
            <div class="modal-body">
                <h2 id="stadiumModalTitle" class="modal-title"></h2>
                <p id="stadiumModalDescription" class="modal-description"></p>

                <div class="modal-info stadium-modal-info">
                    <div class="modal-info-item">
                        <div class="modal-info-label" id="stadiumCapacityLabel"></div>
                        <div class="modal-info-value" id="stadiumCapacityValue"></div>
                    </div>
                    <div class="modal-info-item">
                        <div class="modal-info-label" id="stadiumOpenedLabel"></div>
                        <div class="modal-info-value" id="stadiumOpenedValue"></div>
                    </div>
                    <div class="modal-info-item">
                        <div class="modal-info-label" id="stadiumUseLabel"></div>
                        <div class="modal-info-value" id="stadiumUseValue"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Wildlife Modal -->
    <div class="modal-overlay" id="wildlifeModal">
        <div class="modal-content stadium-modal-content">
            <button class="modal-close" onclick="closeWildlifeModal()">&times;</button>
            <div class="image-container">
                <img id="wildlifeModalImage" class="modal-image stadium-modal-image" src="" alt="Indonesian wildlife" loading="lazy" decoding="async" sizes="(max-width: 768px) 95vw, 640px">
            </div>
            <div class="modal-body">
                <h2 id="wildlifeModalTitle" class="modal-title"></h2>
                <p id="wildlifeModalDescription" class="modal-description"></p>
            </div>
        </div>
    </div>

    <script src="./assets/js/indo.translations.js" defer></script>
    <script src="./assets/js/indo.data.js" defer></script>
    <script src="./assets/js/indo.js" defer></script>
</body>
</html>
